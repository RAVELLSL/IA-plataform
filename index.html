<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diretório de Ferramentas IA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Tema claro (padrão) */
        :root {
            --bg-gradient-from: #e6f7ff;
            --bg-gradient-to: #ffffff;
            --surface: rgba(255, 255, 255, 0.75);
            --surface-hover: rgba(255, 255, 255, 0.95);
            --border-light: rgba(0, 0, 0, 0.05);
            --border-accent: rgba(0, 119, 255, 0.2);
            --text-primary: #0d253f;
            --text-secondary: #3c5a7a;
            --accent: #0077ff;
            --accent-soft: #e6f2ff;
            --shadow-sm: 0 4px 12px rgba(0, 119, 255, 0.08);
            --shadow-hover: 0 12px 24px rgba(0, 119, 255, 0.12);
            --icon-favorite: #ffb700;
            --icon-favorite-inactive: #ccc;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Tema escuro */
        body.dark-theme {
            --bg-gradient-from: #0a1929;
            --bg-gradient-to: #1a2a3a;
            --surface: rgba(30, 40, 50, 0.85);
            --surface-hover: rgba(40, 55, 70, 0.95);
            --border-light: rgba(255, 255, 255, 0.1);
            --border-accent: rgba(100, 180, 255, 0.3);
            --text-primary: #e3f0ff;
            --text-secondary: #b0c8e0;
            --accent: #4da6ff;
            --accent-soft: #1e3a5a;
            --shadow-sm: 0 4px 12px rgba(0, 150, 255, 0.15);
            --shadow-hover: 0 12px 24px rgba(0, 150, 255, 0.25);
            --icon-favorite: #ffd966;
            --icon-favorite-inactive: #5f6b7a;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(145deg, var(--bg-gradient-from), var(--bg-gradient-to));
            min-height: 100vh;
            padding: 24px 20px;
            color: var(--text-primary);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .main-title {
            font-size: clamp(2.5rem, 6vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(145deg, var(--accent), #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 24px;
        }

        /* Barra de ferramentas */
        .toolbar {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 16px 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
        }

        .search-wrapper {
            margin-bottom: 16px;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-light);
            border-radius: 60px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255,255,255,0.8);
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            color: var(--text-primary);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,119,255,0.15), inset 0 1px 4px rgba(0,0,0,0.05);
            background: white;
        }

        /* Linha de controles (abas + ordenação + tema + top5) */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 2;
            min-width: 240px;
        }

        .tab {
            padding: 8px 18px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .tab:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(0,119,255,0.3);
            border-color: transparent;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sort-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--surface);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
        }

        .sort-btn, .theme-btn, .top5-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .sort-btn.active, .top5-btn.active {
            background: var(--accent);
            color: white;
        }

        .theme-btn {
            background: var(--surface);
            border: 1px solid var(--border-light);
        }

        .theme-btn:hover, .sort-btn:hover:not(.active), .top5-btn:hover:not(.active) {
            background: var(--accent-soft);
            color: var(--accent);
        }

        /* Contador de resultados */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .result-count {
            font-weight: 600;
            color: var(--text-primary);
        }

        .clear-filters {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: background 0.2s;
        }

        .clear-filters:hover {
            background: var(--accent-soft);
        }

        /* Lista de ferramentas */
        .tools-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 16px 20px;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
            position: relative;
            cursor: pointer; /* Indica que o card é clicável */
        }

        .tool-item:hover {
            background: var(--surface-hover);
            border-color: var(--border-accent);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .favorite-icon {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--icon-favorite-inactive);
            transition: color 0.2s, transform 0.1s;
            margin-right: 8px;
            user-select: none;
            z-index: 2; /* Garante que fique acima do clique do card */
        }

        .favorite-icon.active {
            color: var(--icon-favorite);
        }

        .favorite-icon:hover {
            transform: scale(1.1);
        }

        .tool-logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: white;
            padding: 6px;
            object-fit: contain;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex-shrink: 0;
            pointer-events: none; /* Evita interferir no clique do card */
        }

        .tool-info {
            flex: 1;
            min-width: 0;
            pointer-events: none; /* O texto não deve bloquear o clique */
        }

        .tool-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px 12px;
            margin-bottom: 4px;
        }

        .tool-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .tool-category {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(0,119,255,0.15);
        }

        .tool-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2; /* Propriedade padrão para compatibilidade */
            overflow: hidden;
            line-height: 1.5;
        }

        .tool-action {
            flex-shrink: 0;
            pointer-events: none; /* O botão será clicado via JavaScript, não precisa de eventos diretos */
        }

        .tool-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 22px;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            pointer-events: none; /* Desabilita o clique direto no link, será manipulado pelo card */
        }

        .tool-link i::before {
            content: "↗";
            font-style: normal;
            font-size: 1.2rem;
        }

        .no-results {
            text-align: center;
            padding: 48px 20px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            border: 2px dashed var(--border-light);
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .tool-item {
                flex-wrap: wrap;
            }
            .tool-logo {
                width: 48px;
                height: 48px;
            }
            .tool-action {
                width: 100%;
            }
            .tool-link {
                width: 100%;
                justify-content: center;
            }
            .tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 4px;
                justify-content: flex-start;
            }
            .tab {
                flex-shrink: 0;
            }
            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }
            .action-buttons {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .tool-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">Inteligência Artificial</h1>
            <p class="subtitle">Ferramentas selecionadas para turbinar sua criatividade, produtividade e conhecimento.</p>
        </header>

        <div class="toolbar">
            <div class="search-wrapper">
                <input type="text" class="search-box" id="searchInput" placeholder="Buscar ferramentas por nome ou descrição...">
            </div>
            
            <div class="controls-row">
                <div class="tabs" id="categoryTabs">
                    <button class="tab active" data-category="all">Todas</button>
                    <button class="tab" data-category="chat">Chat</button>
                    <button class="tab" data-category="creative">Criativas</button>
                    <button class="tab" data-category="video">Vídeo</button>
                    <button class="tab" data-category="productivity">Produtividade</button>
                </div>

                <div class="action-buttons">
                    <div class="sort-controls">
                        <button class="sort-btn active" data-sort="alpha">A-Z</button>
                        <button class="sort-btn" data-sort="favorite">⭐ Favoritos</button>
                    </div>
                    <button class="top5-btn" id="top5Btn">🔥 Top 5</button>
                    <button class="theme-btn" id="themeToggle">🌓 Tema</button>
                </div>
            </div>
        </div>

        <div class="results-info">
            <span><span class="result-count" id="resultCount">0</span> ferramentas encontradas</span>
            <button class="clear-filters" id="clearFilters">Limpar filtros</button>
        </div>

        <div class="tools-list" id="toolsList"></div>

        <footer class="footer">
            <p>© 2025 · Diretório de IA · Atualizado regularmente</p>
        </footer>
    </div>

    <script>
        (function() {
            // ---------- BASE DE DADOS DAS FERRAMENTAS ----------
            const tools = [
                { name: "ChatGPT", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMdM9MEQ0ExL1PmInT3U5I8v63YXBEdoIT0Q&s", category: "chat", description: "Assistente geral para conversas, criação de texto e suporte.", url: "https://chatgpt.com/" },
                { name: "Gemini", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThr7qrIazsvZwJuw-uZCtLzIjaAyVW_ZrlEQ&s", category: "chat", description: "IA do Google integrada ao ecossistema Workspace e pesquisas.", url: "https://gemini.google.com/app" },
                { name: "Copilot", logo: "https://play-lh.googleusercontent.com/p8R1lAZI5_WCOzmvBYnOQasCWcjc9d2vM7z4PaVku8b9AfxGhqQqM0ldJ8KULHblVj-g", category: "chat", description: "Assistente da Microsoft para código, texto e busca.", url: "https://copilot.microsoft.com/" },
                { name: "Deepseek", logo: "https://cdn.worldvectorlogo.com/logos/deepseek-2.svg", category: "chat", description: "Focado em programação e raciocínio lógico profundo.", url: "https://chat.deepseek.com/" },
                { name: "Qwen", logo: "https://crystalpng.com/wp-content/uploads/2025/02/Qwen-05.png", category: "chat", description: "Modelo da Alibaba para tarefas diversas e suporte multilíngue.", url: "https://qwen.ai/home" },
                { name: "Grok", logo: "https://img.icons8.com/color/1200/grok--v2.jpg", category: "chat", description: "Assistente de IA da xAI com respostas diretas e atualizadas.", url: "https://grok.com/" },
                { name: "Suno", logo: "https://images.seeklogo.com/logo-png/52/2/suno-ai-logo-png_seeklogo-528379.png", category: "creative", description: "Criação de músicas e áudio com IA generativa.", url: "https://suno.com/" },
                { name: "Jules", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvAXEz4EsU3RQHCV96BAfJusei09ZBjQOG2g&s", category: "creative", description: "Geração e edição de imagens por comandos de texto.", url: "https://jules.google.com/task" },
                { name: "Manus AI", logo: "https://play-lh.googleusercontent.com/7RIeDBEnjVVn3d1yr441p7u0BK9eT8E6P9i__XYTcJAzOe7sqVgJp7pmlypqY9NBqjI", category: "creative", description: "Design gráfico e edição profissional com IA.", url: "https://manus.im/app" },
                { name: "LM Arena", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxPgTgdL2Ttbt9TCA8vYFPsFOqz_Dppec8gg&s", category: "creative", description: "Comparação lado a lado de grandes modelos de linguagem.", url: "https://lmarena.ai/?mode=direct" },
                { name: "Wan", logo: "https://catai.com.br/wp-content/uploads/2025/08/Wan-01.jpg", category: "video", description: "Criação automática de vídeos a partir de roteiros.", url: "https://create.wan.video/" },
                { name: "Vids", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Google_Vids_2024_Logo.svg/250px-Google_Vids_2024_Logo.svg.png", category: "video", description: "Ferramenta do Google Workspace para edição e criação de vídeos.", url: "https://workspace.google.com/intl/pt-BR/products/vids/" },
                { name: "Perplexity", logo: "https://images.seeklogo.com/logo-png/61/2/perplexity-ai-icon-black-logo-png_seeklogo-611679.png", category: "productivity", description: "Mecanismo de busca com respostas geradas por IA.", url: "https://www.perplexity.ai/" },
                { name: "NotebookLM", logo: "https://static1.xdaimages.com/wordpress/wp-content/uploads/2025/03/notebooklm-removebg-preview.png", category: "productivity", description: "Organização de notas e resumos com base nos seus documentos.", url: "https://notebooklm.google.com/" }
            ];

            const categoryNames = {
                all: "Todas",
                chat: "Chat",
                creative: "Criativas",
                video: "Vídeo",
                productivity: "Produtividade"
            };

            // Elementos DOM
            const toolsListEl = document.getElementById('toolsList');
            const searchInput = document.getElementById('searchInput');
            const tabs = document.querySelectorAll('.tab');
            const resultCountSpan = document.getElementById('resultCount');
            const clearBtn = document.getElementById('clearFilters');
            const sortBtns = document.querySelectorAll('.sort-btn');
            const themeToggle = document.getElementById('themeToggle');
            const top5Btn = document.getElementById('top5Btn');

            // Estado
            let activeCategory = 'all';
            let searchTerm = '';
            let sortMode = 'alpha'; // 'alpha' ou 'favorite'
            let top5Mode = false;    // se true, mostra apenas as 5 mais usadas
            let favorites = JSON.parse(localStorage.getItem('iaFavorites')) || {};
            let usageCount = JSON.parse(localStorage.getItem('iaUsageCount')) || {};

            // Tema
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
            }

            // ---------- FUNÇÕES ----------
            function saveFavorites() {
                localStorage.setItem('iaFavorites', JSON.stringify(favorites));
            }

            function saveUsageCount() {
                localStorage.setItem('iaUsageCount', JSON.stringify(usageCount));
            }

            function incrementUsage(toolName) {
                usageCount[toolName] = (usageCount[toolName] || 0) + 1;
                saveUsageCount();
            }

            function toggleFavorite(toolName) {
                if (favorites[toolName]) {
                    delete favorites[toolName];
                } else {
                    favorites[toolName] = true;
                }
                saveFavorites();
                renderList();
            }

            function filterTools() {
                return tools.filter(tool => {
                    if (activeCategory !== 'all' && tool.category !== activeCategory) return false;
                    if (searchTerm.trim() !== '') {
                        const term = searchTerm.toLowerCase();
                        return tool.name.toLowerCase().includes(term) || tool.description.toLowerCase().includes(term);
                    }
                    return true;
                });
            }

            function sortTools(toolsArray) {
                let sorted = [...toolsArray];
                if (top5Mode) {
                    // Ordena por uso (decrescente) e pega os 5 primeiros
                    sorted.sort((a, b) => (usageCount[b.name] || 0) - (usageCount[a.name] || 0));
                    return sorted.slice(0, 5);
                } else {
                    if (sortMode === 'alpha') {
                        sorted.sort((a, b) => a.name.localeCompare(b.name));
                    } else if (sortMode === 'favorite') {
                        sorted.sort((a, b) => {
                            const aFav = favorites[a.name] ? 1 : 0;
                            const bFav = favorites[b.name] ? 1 : 0;
                            if (aFav !== bFav) return bFav - aFav;
                            return a.name.localeCompare(b.name);
                        });
                    }
                    return sorted;
                }
            }

            function handleCardClick(toolName, url) {
                incrementUsage(toolName);
                window.open(url, '_blank');
            }

            function renderList() {
                const filtered = filterTools();
                const sorted = sortTools(filtered);
                resultCountSpan.textContent = sorted.length;

                if (sorted.length === 0) {
                    toolsListEl.innerHTML = `<div class="no-results">Nenhuma ferramenta encontrada com os filtros atuais.</div>`;
                    return;
                }

                let html = '';
                sorted.forEach(tool => {
                    const isFav = favorites[tool.name] || false;
                    html += `
                        <div class="tool-item" data-tool="${tool.name}" data-url="${tool.url}">
                            <span class="favorite-icon ${isFav ? 'active' : ''}" data-tool="${tool.name}">${isFav ? '⭐' : '☆'}</span>
                            <img src="${tool.logo}" alt="${tool.name}" class="tool-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/56?text=IA'">
                            <div class="tool-info">
                                <div class="tool-header">
                                    <span class="tool-name">${tool.name}</span>
                                    <span class="tool-category">${categoryNames[tool.category] || tool.category}</span>
                                </div>
                                <div class="tool-description">${tool.description}</div>
                            </div>
                            <div class="tool-action">
                                <span class="tool-link">
                                    <span>Acessar</span>
                                    <i aria-hidden="true"></i>
                                </span>
                            </div>
                        </div>
                    `;
                });

                toolsListEl.innerHTML = html;

                // Adiciona eventos de clique nos cards (exceto na estrela)
                document.querySelectorAll('.tool-item').forEach(card => {
                    card.addEventListener('click', (e) => {
                        // Se o clique foi na estrela, não abrir o link
                        if (e.target.classList.contains('favorite-icon') || e.target.parentElement?.classList.contains('favorite-icon')) {
                            return;
                        }
                        const toolName = card.dataset.tool;
                        const url = card.dataset.url;
                        handleCardClick(toolName, url);
                    });
                });

                // Eventos nas estrelas
                document.querySelectorAll('.favorite-icon').forEach(star => {
                    star.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const toolName = star.dataset.tool;
                        toggleFavorite(toolName);
                    });
                });
            }

            function setActiveTab(category) {
                tabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.category === category);
                });
            }

            function setActiveSort(mode) {
                sortBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.sort === mode);
                });
            }

            function setTop5Mode(active) {
                top5Mode = active;
                top5Btn.classList.toggle('active', active);
                // Quando ativa o Top 5, desativa visualmente os botões de ordenação (mas mantém o estado)
                sortBtns.forEach(btn => {
                    btn.style.opacity = active ? '0.5' : '1';
                    btn.style.pointerEvents = active ? 'none' : 'auto';
                });
                renderList();
            }

            // ---------- EVENTOS ----------
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    activeCategory = e.currentTarget.dataset.category;
                    setActiveTab(activeCategory);
                    renderList();
                });
            });

            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderList();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchTerm = '';
                activeCategory = 'all';
                setActiveTab('all');
                if (top5Mode) setTop5Mode(false);
                renderList();
            });

            sortBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (top5Mode) setTop5Mode(false); // desativa Top 5 ao escolher ordenação
                    sortMode = btn.dataset.sort;
                    setActiveSort(sortMode);
                    renderList();
                });
            });

            top5Btn.addEventListener('click', () => {
                setTop5Mode(!top5Mode);
            });

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                const isDark = document.body.classList.contains('dark-theme');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

            // Inicialização
            function init() {
                setActiveTab('all');
                setActiveSort('alpha');
                setTop5Mode(false);
                // Atualizar contagem nas abas
                const allTab = document.querySelector('.tab[data-category="all"]');
                if (allTab) allTab.textContent = `Todas (${tools.length})`;
                tabs.forEach(tab => {
                    const cat = tab.dataset.category;
                    if (cat !== 'all') {
                        const count = tools.filter(t => t.category === cat).length;
                        tab.textContent = `${categoryNames[cat] || cat} (${count})`;
                    }
                });
                renderList();
            }

            init();
        })();
    </script>
</body>
</html>
