<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inteligência Artificial · Diretório de Ferramentas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-from: #e6f7ff;
            --bg-gradient-to: #ffffff;
            --surface: rgba(255, 255, 255, 0.75);
            --surface-hover: rgba(255, 255, 255, 0.95);
            --border-light: rgba(0, 0, 0, 0.05);
            --border-accent: rgba(0, 119, 255, 0.2);
            --text-primary: #0d253f;
            --text-secondary: #3c5a7a;
            --accent: #0077ff;
            --accent-soft: #e6f2ff;
            --shadow-sm: 0 4px 12px rgba(0, 119, 255, 0.08);
            --shadow-hover: 0 12px 24px rgba(0, 119, 255, 0.12);
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(145deg, var(--bg-gradient-from), var(--bg-gradient-to));
            min-height: 100vh;
            padding: 24px 20px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .main-title {
            font-size: clamp(2.5rem, 6vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(145deg, var(--accent), #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 24px;
        }

        /* Barra de ferramentas (busca + abas) */
        .toolbar {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 16px 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
        }

        .search-wrapper {
            margin-bottom: 16px;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-light);
            border-radius: 60px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255,255,255,0.8);
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,119,255,0.15), inset 0 1px 4px rgba(0,0,0,0.05);
            background: white;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .tab {
            padding: 8px 18px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .tab:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(0,119,255,0.3);
            border-color: transparent;
        }

        /* Contador de resultados */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .result-count {
            font-weight: 600;
            color: var(--text-primary);
        }

        .clear-filters {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: background 0.2s;
        }

        .clear-filters:hover {
            background: var(--accent-soft);
        }

        /* Lista de ferramentas */
        .tools-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 16px 20px;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
            position: relative;
        }

        .tool-item:hover {
            background: var(--surface-hover);
            border-color: var(--border-accent);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .tool-logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: white;
            padding: 6px;
            object-fit: contain;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .tool-info {
            flex: 1;
            min-width: 0;
        }

        .tool-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px 12px;
            margin-bottom: 4px;
        }

        .tool-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .tool-category {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(0,119,255,0.15);
        }

        .tool-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .tool-action {
            flex-shrink: 0;
        }

        .tool-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 22px;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .tool-link:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .tool-link i {
            font-size: 1.1rem;
            transition: transform 0.15s;
        }

        .tool-link:hover i {
            transform: translate(3px, -2px);
        }

        /* Mensagem quando não há resultados */
        .no-results {
            text-align: center;
            padding: 48px 20px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            border: 2px dashed var(--border-light);
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Responsividade */
        @media (max-width: 700px) {
            .tool-item {
                flex-wrap: wrap;
            }

            .tool-logo {
                width: 48px;
                height: 48px;
            }

            .tool-action {
                width: 100%;
            }

            .tool-link {
                width: 100%;
                justify-content: center;
            }

            .tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 4px;
                justify-content: flex-start;
            }

            .tab {
                flex-shrink: 0;
            }
        }

        @media (max-width: 480px) {
            .tool-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }

        /* Ícone de seta simples (usando entidade) */
        .tool-link i::before {
            content: "↗";
            font-style: normal;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">Inteligência Artificial</h1>
            <p class="subtitle">Ferramentas selecionadas para turbinar sua criatividade, produtividade e conhecimento.</p>
        </header>

        <div class="toolbar">
            <div class="search-wrapper">
                <input type="text" class="search-box" id="searchInput" placeholder="Buscar ferramentas por nome ou descrição...">
            </div>
            <div class="tabs" id="categoryTabs">
                <button class="tab active" data-category="all">Todas</button>
                <button class="tab" data-category="chat">Chat</button>
                <button class="tab" data-category="creative">Criativas</button>
                <button class="tab" data-category="video">Vídeo</button>
                <button class="tab" data-category="productivity">Produtividade</button>
            </div>
        </div>

        <div class="results-info">
            <span><span class="result-count" id="resultCount">0</span> ferramentas encontradas</span>
            <button class="clear-filters" id="clearFilters">Limpar filtros</button>
        </div>

        <div class="tools-list" id="toolsList"></div>

        <footer class="footer">
            <p>© 2025 · Diretório de IA · Atualizado regularmente</p>
        </footer>
    </div>

    <script>
        (function() {
            // ---------- BASE DE DADOS DAS FERRAMENTAS ----------
            const tools = [
                { name: "ChatGPT", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMdM9MEQ0ExL1PmInT3U5I8v63YXBEdoIT0Q&s", category: "chat", description: "Assistente geral para conversas, criação de texto e suporte.", url: "https://chatgpt.com/" },
                { name: "Gemini", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThr7qrIazsvZwJuw-uZCtLzIjaAyVW_ZrlEQ&s", category: "chat", description: "IA do Google integrada ao ecossistema Workspace e pesquisas.", url: "https://gemini.google.com/app" },
                { name: "Copilot", logo: "https://play-lh.googleusercontent.com/p8R1lAZI5_WCOzmvBYnOQasCWcjc9d2vM7z4PaVku8b9AfxGhqQqM0ldJ8KULHblVj-g", category: "chat", description: "Assistente da Microsoft para código, texto e busca.", url: "https://copilot.microsoft.com/" },
                { name: "Deepseek", logo: "https://cdn.worldvectorlogo.com/logos/deepseek-2.svg", category: "chat", description: "Focado em programação e raciocínio lógico profundo.", url: "https://chat.deepseek.com/" },
                { name: "Qwen", logo: "https://crystalpng.com/wp-content/uploads/2025/02/Qwen-05.png", category: "chat", description: "Modelo da Alibaba para tarefas diversas e suporte multilíngue.", url: "https://qwen.ai/home" },
                { name: "Suno", logo: "https://images.seeklogo.com/logo-png/52/2/suno-ai-logo-png_seeklogo-528379.png", category: "creative", description: "Criação de músicas e áudio com IA generativa.", url: "https://suno.com/" },
                { name: "Jules", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvAXEz4EsU3RQHCV96BAfJusei09ZBjQOG2g&s", category: "creative", description: "Geração e edição de imagens por comandos de texto.", url: "https://jules.google.com/task" },
                { name: "Manus AI", logo: "https://play-lh.googleusercontent.com/7RIeDBEnjVVn3d1yr441p7u0BK9eT8E6P9i__XYTcJAzOe7sqVgJp7pmlypqY9NBqjI", category: "creative", description: "Design gráfico e edição profissional com IA.", url: "https://manus.im/app" },
                { name: "LM Arena", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxPgTgdL2Ttbt9TCA8vYFPsFOqz_Dppec8gg&s", category: "creative", description: "Comparação lado a lado de grandes modelos de linguagem.", url: "https://lmarena.ai/?mode=direct" },
                { name: "Wan", logo: "https://catai.com.br/wp-content/uploads/2025/08/Wan-01.jpg", category: "video", description: "Criação automática de vídeos a partir de roteiros.", url: "https://create.wan.video/" },
                { name: "Vids", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Google_Vids_2024_Logo.svg/250px-Google_Vids_2024_Logo.svg.png", category: "video", description: "Ferramenta do Google Workspace para edição e criação de vídeos.", url: "https://workspace.google.com/intl/pt-BR/products/vids/" },
                { name: "Perplexity", logo: "https://images.seeklogo.com/logo-png/61/2/perplexity-ai-icon-black-logo-png_seeklogo-611679.png", category: "productivity", description: "Mecanismo de busca com respostas geradas por IA.", url: "https://www.perplexity.ai/" },
                { name: "NotebookLM", logo: "https://static1.xdaimages.com/wordpress/wp-content/uploads/2025/03/notebooklm-removebg-preview.png", category: "productivity", description: "Organização de notas e resumos com base nos seus documentos.", url: "https://notebooklm.google.com/" }
            ];

            // Mapeamento de categorias para exibição amigável
            const categoryNames = {
                all: "Todas",
                chat: "Chat",
                creative: "Criativas",
                video: "Vídeo",
                productivity: "Produtividade"
            };

            // Elementos DOM
            const toolsListEl = document.getElementById('toolsList');
            const searchInput = document.getElementById('searchInput');
            const tabs = document.querySelectorAll('.tab');
            const resultCountSpan = document.getElementById('resultCount');
            const clearBtn = document.getElementById('clearFilters');

            // Estado atual
            let activeCategory = 'all';
            let searchTerm = '';

            // ---------- FUNÇÕES DE RENDERIZAÇÃO ----------
            function filterTools() {
                return tools.filter(tool => {
                    // Filtro por categoria
                    if (activeCategory !== 'all' && tool.category !== activeCategory) return false;

                    // Filtro por texto (case insensitive)
                    if (searchTerm.trim() !== '') {
                        const term = searchTerm.toLowerCase();
                        return tool.name.toLowerCase().includes(term) || tool.description.toLowerCase().includes(term);
                    }
                    return true;
                });
            }

            function renderList() {
                const filtered = filterTools();
                resultCountSpan.textContent = filtered.length;

                if (filtered.length === 0) {
                    toolsListEl.innerHTML = `<div class="no-results">Nenhuma ferramenta encontrada com os filtros atuais.</div>`;
                    return;
                }

                let html = '';
                filtered.forEach(tool => {
                    html += `
                        <div class="tool-item" data-category="${tool.category}">
                            <img src="${tool.logo}" alt="${tool.name}" class="tool-logo" loading="lazy">
                            <div class="tool-info">
                                <div class="tool-header">
                                    <span class="tool-name">${tool.name}</span>
                                    <span class="tool-category">${categoryNames[tool.category] || tool.category}</span>
                                </div>
                                <div class="tool-description">${tool.description}</div>
                            </div>
                            <div class="tool-action">
                                <a href="${tool.url}" target="_blank" class="tool-link" rel="noopener">
                                    <span>Acessar</span>
                                    <i aria-hidden="true"></i>
                                </a>
                            </div>
                        </div>
                    `;
                });

                toolsListEl.innerHTML = html;
            }

            // ---------- ATUALIZAR ABAS ATIVAS ----------
            function setActiveTab(category) {
                tabs.forEach(tab => {
                    const tabCat = tab.dataset.category;
                    if (tabCat === category) {
                        tab.classList.add('active');
                    } else {
                        tab.classList.remove('active');
                    }
                });
            }

            // ---------- EVENTOS ----------
            // Clique nas abas
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const category = e.currentTarget.dataset.category;
                    activeCategory = category;
                    setActiveTab(category);
                    renderList();
                });
            });

            // Busca em tempo real
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderList();
            });

            // Botão limpar filtros
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchTerm = '';
                activeCategory = 'all';
                setActiveTab('all');
                renderList();
            });

            // Inicialização: garantir aba correta e renderizar
            setActiveTab('all');
            renderList();

            // Pequeno detalhe: contagem total na aba "Todas" (opcional, mas legal)
            const allTab = document.querySelector('.tab[data-category="all"]');
            if (allTab) {
                allTab.textContent = `Todas (${tools.length})`;
            }
            // Atualizar outras abas com contagem
            tabs.forEach(tab => {
                const cat = tab.dataset.category;
                if (cat !== 'all') {
                    const count = tools.filter(t => t.category === cat).length;
                    tab.textContent = `${categoryNames[cat] || cat} (${count})`;
                }
            });
        })();
    </script>
</body>
</html>
